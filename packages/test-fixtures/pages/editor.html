<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fixture: Editors</title>
  </head>
  <body>
    <main>
      <h1>Editor fixtures</h1>
      <label
        >Textarea<textarea id="textarea">This sentence could be worded more good.</textarea></label
      ><label
        >Text input<input
          id="text"
          type="text"
          value="A very long and wordy sentence that can be shorter."
      /></label>
      <div id="contenteditable" contenteditable="true" role="textbox" aria-label="Basic editor">
        A basic editable sentence.
      </div>
    </main>
  </body>
</html>
