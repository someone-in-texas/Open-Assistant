name: Native release
on:
  workflow_dispatch:
  push:
    tags: ["v*"]
permissions:
  contents: read
jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with: { toolchain: stable }
      - run: cargo test --locked --manifest-path apps/native-host/Cargo.toml
      - run: cargo build --locked --release --manifest-path apps/native-host/Cargo.toml
      - name: Block unsigned tag publication
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Native publication is blocked until Authenticode and Developer ID notarization are configured in a protected environment."
          exit 1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: native-unsigned-${{ runner.os }}
          path: target/release/open-assistant-native-host*
          retention-days: 7
