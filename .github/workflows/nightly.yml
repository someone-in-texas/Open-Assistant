name: Nightly
on:
  schedule:
    - cron: "23 7 * * *"
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  adversarial-and-reproducible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with: { version: 11.5.1 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with: { node-version: 22.22.0, cache: pnpm }
      - name: Set up Firefox
        id: setup-firefox
        uses: browser-actions/setup-firefox@0bc507ddf224827e3b1af68e014d5e42ab93e795
        with: { firefox-version: latest }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:security
      - run: xvfb-run --auto-servernum pnpm smoke
        env:
          FIREFOX_BINARY: ${{ steps.setup-firefox.outputs.firefox-path }}
      - run: pnpm package:extension && cp artifacts/*-unsigned.zip /tmp/first.zip && pnpm package:extension && cmp /tmp/first.zip artifacts/*-unsigned.zip
      - run: pnpm audit --audit-level high
      - name: Bridge fixture compatibility
        run: pnpm test:integration -- --testNamePattern="context boundary"
