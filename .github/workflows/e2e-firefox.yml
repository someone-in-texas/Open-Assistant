name: Firefox E2E
on:
  pull_request:
    paths: ["apps/extension/**", "apps/mock-relay/**", "packages/**", "tests/**", "pnpm-lock.yaml"]
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with: { version: 11.5.1 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with: { node-version: 22.22.0, cache: pnpm }
      - name: Set up Firefox
        id: setup-firefox
        if: runner.os == 'Linux'
        uses: browser-actions/setup-firefox@0bc507ddf224827e3b1af68e014d5e42ab93e795
        with: { firefox-version: latest }
      - run: pnpm install --frozen-lockfile
      - name: Smoke with virtual display
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm smoke
        env:
          FIREFOX_BINARY: ${{ steps.setup-firefox.outputs.firefox-path }}
      - name: Smoke
        if: runner.os != 'Linux'
        run: pnpm smoke
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: failure()
        with:
          name: firefox-failure-${{ runner.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
