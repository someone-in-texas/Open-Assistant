name: Firefox E2E
on:
  pull_request:
    paths: ["apps/extension/**", "apps/mock-relay/**", "packages/**", "tests/**", "pnpm-lock.yaml"]
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with: { version: 11.5.1 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with: { node-version: 22.22.0, cache: pnpm }
      - name: Set up Firefox
        id: setup-firefox
        if: runner.os == 'Linux'
        uses: browser-actions/setup-firefox@0bc507ddf224827e3b1af68e014d5e42ab93e795
        with: { firefox-version: latest }
      - run: pnpm install --frozen-lockfile
      - name: Smoke with virtual display
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm smoke
        env:
          FIREFOX_BINARY: ${{ steps.setup-firefox.outputs.firefox-path }}
      - name: Smoke
        if: runner.os != 'Linux'
        run: pnpm smoke
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: failure()
        with:
          name: firefox-failure-${{ runner.os }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
