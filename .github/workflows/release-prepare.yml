name: Prepare release
on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer without v prefix
        required: true
permissions:
  contents: write
  pull-requests: write
jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with: { version: 11.5.1 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with: { node-version: 22.22.0, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:prepare --version "${{ inputs.version }}"
      - name: Create release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="release/${{ inputs.version }}"
          git switch -c "$branch"
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -s -m "chore(release): ${{ inputs.version }}"
          git push origin "$branch"
          gh pr create --draft --title "Release ${{ inputs.version }}" --body "Automated release preparation. Review all release gates before merge."
