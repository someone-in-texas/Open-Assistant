name: Prepare release
on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer without v prefix
        required: true
permissions:
  contents: write
  pull-requests: write
jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with: { version: 11.5.1 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with: { node-version: 22.22.0, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:prepare --version "${{ inputs.version }}"
      - name: Create release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="release/${{ inputs.version }}"
          git switch -c "$branch"
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -s -m "chore(release): ${{ inputs.version }}"
          git push origin "$branch"
          gh pr create --draft --title "Release ${{ inputs.version }}" --body "Automated release preparation. Review all release gates before merge."
