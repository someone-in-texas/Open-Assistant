name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  id-token: write
  attestations: write
jobs:
  build-submit:
    runs-on: ubuntu-latest
    environment: production
    env:
      OPEN_ASSISTANT_HOSTED_ORIGIN: ${{ vars.OPEN_ASSISTANT_HOSTED_ORIGIN }}
      OPEN_ASSISTANT_OIDC_ORIGIN: ${{ vars.OPEN_ASSISTANT_OIDC_ORIGIN }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with: { fetch-depth: 0 }
      - name: Verify annotated SemVer tag on main
        run: |
          test "$(git cat-file -t "$GITHUB_REF_NAME")" = tag
          printf '%s' "$GITHUB_REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'
          git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with: { version: 11.5.1 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with: { node-version: 22.22.0, cache: pnpm }
      - name: Require production HTTPS origins
        run: |
          for origin in "$OPEN_ASSISTANT_HOSTED_ORIGIN" "$OPEN_ASSISTANT_OIDC_ORIGIN"; do
            test -n "$origin"
            case "$origin" in https://*) ;; *) exit 1 ;; esac
            case "$origin" in *.invalid|*.invalid/*) exit 1 ;; esac
          done
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:verify
      - run: pnpm package:source && pnpm generate:sbom && pnpm checksums
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: artifacts/*
      - name: Submit to AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: pnpm exec web-ext sign --source-dir apps/extension/dist --artifacts-dir artifacts --channel unlisted
      - name: Verify Mozilla-signed artifact and record AMO state
        run: |
          shopt -s nullglob
          signed=(artifacts/*.xpi)
          test "${#signed[@]}" -eq 1
          unzip -t "${signed[0]}"
          printf '{"tag":"%s","state":"signed","artifact":"%s"}\n' "$GITHUB_REF_NAME" "$(basename "${signed[0]}")" > artifacts/amo-status.json
          pnpm checksums
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-artifacts
          path: artifacts/*
          retention-days: 30
